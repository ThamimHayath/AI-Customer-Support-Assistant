<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NexaSupport AI — Customer Support Assistant</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --surface-0: #f4f4f2;
      --surface-1: #f9f9f7;
      --surface-2: #ffffff;
      --text-primary: #1a1a18;
      --text-secondary: #5f5e5a;
      --text-muted: #9e9d99;
      --border: rgba(0,0,0,0.1);
      --border-strong: rgba(0,0,0,0.18);
      --bg-accent: #e6f1fb;
      --text-accent: #185fa5;
      --border-accent: #85b7eb;
      --fill-accent: #378ADD;
      --bg-success: #eaf3de;
      --text-success: #3b6d11;
      --bg-warning: #faeeda;
      --text-warning: #854f0b;
      --border-warning: #ef9f27;
      --radius: 8px;
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --surface-0: #1c1c1a;
        --surface-1: #252523;
        --surface-2: #2e2e2b;
        --text-primary: #f0efeb;
        --text-secondary: #b4b2a9;
        --text-muted: #6b6a66;
        --border: rgba(255,255,255,0.1);
        --border-strong: rgba(255,255,255,0.18);
        --bg-accent: #0c447c;
        --text-accent: #85b7eb;
        --border-accent: #185fa5;
        --fill-accent: #378ADD;
        --bg-success: #27500a;
        --text-success: #c0dd97;
        --bg-warning: #633806;
        --text-warning: #fac775;
        --border-warning: #ba7517;
      }
    }

    body {
      font-family: var(--font-sans);
      background: var(--surface-0);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    header {
      text-align: center;
      margin-bottom: 20px;
    }

    header .logo {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }

    header .logo-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: var(--fill-accent);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 18px;
    }

    header h1 {
      font-size: 20px;
      font-weight: 600;
      color: var(--text-primary);
    }

    header p {
      font-size: 14px;
      color: var(--text-muted);
    }

    #app {
      display: flex;
      width: 100%;
      max-width: 820px;
      height: 580px;
      border: 0.5px solid var(--border-strong);
      border-radius: 14px;
      overflow: hidden;
      background: var(--surface-2);
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }

    /* Sidebar */
    #sidebar {
      width: 210px;
      border-right: 0.5px solid var(--border);
      background: var(--surface-1);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    #sidebar-header {
      padding: 16px;
      border-bottom: 0.5px solid var(--border);
    }

    #sidebar-header h2 {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .category-list { padding: 8px; flex: 1; }

    .cat-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 9px 10px;
      border: none;
      background: none;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 13.5px;
      color: var(--text-secondary);
      font-family: var(--font-sans);
      text-align: left;
      transition: background 0.12s, color 0.12s;
    }

    .cat-btn:hover { background: var(--surface-2); color: var(--text-primary); }
    .cat-btn.active { background: var(--bg-accent); color: var(--text-accent); }
    .cat-btn i { font-size: 17px; }

    #sidebar-footer {
      padding: 14px;
      border-top: 0.5px solid var(--border);
    }

    .agent-card { display: flex; align-items: center; gap: 10px; }

    .agent-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
      flex-shrink: 0;
      box-shadow: 0 0 0 2px rgba(34,197,94,0.25);
    }

    .agent-info p { font-size: 13px; font-weight: 500; color: var(--text-primary); }
    .agent-info span { font-size: 11px; color: var(--text-muted); }

    /* Chat */
    #chat-area { flex: 1; display: flex; flex-direction: column; min-width: 0; }

    #chat-header {
      padding: 13px 18px;
      border-bottom: 0.5px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface-2);
    }

    #chat-header-left { display: flex; align-items: center; gap: 10px; }

    .header-avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: var(--bg-accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-accent);
      flex-shrink: 0;
    }

    #chat-title { font-size: 14px; font-weight: 500; color: var(--text-primary); }
    #chat-subtitle { font-size: 12px; color: var(--text-muted); }

    #ticket-badge {
      font-size: 11px;
      background: var(--bg-success);
      color: var(--text-success);
      padding: 3px 9px;
      border-radius: 20px;
      font-weight: 500;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }

    .msg { display: flex; gap: 8px; align-items: flex-start; }
    .msg.user { flex-direction: row-reverse; }

    .msg-bubble {
      max-width: 72%;
      padding: 10px 14px;
      font-size: 14px;
      line-height: 1.55;
    }

    .msg.bot .msg-bubble {
      background: var(--surface-1);
      border: 0.5px solid var(--border);
      color: var(--text-primary);
      border-radius: 2px 12px 12px 12px;
    }

    .msg.user .msg-bubble {
      background: var(--bg-accent);
      color: var(--text-primary);
      border-radius: 12px 2px 12px 12px;
    }

    .msg-time {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 5px;
      display: block;
    }

    .msg.user .msg-time { text-align: right; }

    .bot-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--fill-accent);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .bot-avatar i { font-size: 14px; color: #fff; }

    .user-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--bg-success);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 10px;
      font-weight: 600;
      color: var(--text-success);
      margin-top: 2px;
    }

    .typing-indicator { display: flex; gap: 4px; padding: 2px 0; align-items: center; }
    .typing-indicator span {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: bounce 1.2s infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-5px); }
    }

    .suggestion-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

    .chip {
      font-size: 12px;
      padding: 5px 11px;
      border: 0.5px solid var(--border-accent);
      background: none;
      color: var(--text-accent);
      border-radius: 20px;
      cursor: pointer;
      font-family: var(--font-sans);
      transition: background 0.12s;
    }

    .chip:hover { background: var(--bg-accent); }

    #input-area {
      padding: 12px 16px;
      border-top: 0.5px solid var(--border);
      background: var(--surface-2);
    }

    .input-row { display: flex; gap: 8px; align-items: flex-end; }

    #user-input {
      flex: 1;
      resize: none;
      border: 0.5px solid var(--border-strong);
      border-radius: var(--radius);
      padding: 9px 12px;
      font-size: 14px;
      font-family: var(--font-sans);
      color: var(--text-primary);
      background: var(--surface-1);
      line-height: 1.4;
      height: 40px;
      max-height: 100px;
      overflow-y: hidden;
    }

    #user-input:focus { outline: none; border-color: var(--border-accent); }

    #user-input::placeholder { color: var(--text-muted); }

    #send-btn {
      width: 38px;
      height: 38px;
      border-radius: var(--radius);
      border: none;
      background: var(--fill-accent);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.15s;
      font-size: 16px;
    }

    #send-btn:hover { opacity: 0.85; }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .escalate-banner {
      background: var(--bg-warning);
      border: 0.5px solid var(--border-warning);
      border-radius: var(--radius);
      padding: 10px 14px;
      font-size: 13px;
      color: var(--text-warning);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* Responsive */
    @media (max-width: 600px) {
      #sidebar { width: 56px; }
      #sidebar-header h2, .cat-btn span, .agent-info { display: none; }
      .cat-btn { justify-content: center; padding: 10px; }
      .cat-btn i { font-size: 20px; }
      #sidebar-footer { padding: 10px; }
      .agent-dot { margin: 0 auto; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon"><i class="ti ti-headset"></i></div>
    <h1>NexaSupport AI</h1>
  </div>
  <p>Powered by Claude · Gaming &amp; SaaS Customer Support</p>
</header>

<div id="app">
  <div id="sidebar">
    <div id="sidebar-header"><h2>Topics</h2></div>
    <div class="category-list">
      <button class="cat-btn active" data-cat="general" onclick="setCategory(this,'general')">
        <i class="ti ti-message-circle"></i><span>General</span>
      </button>
      <button class="cat-btn" data-cat="billing" onclick="setCategory(this,'billing')">
        <i class="ti ti-credit-card"></i><span>Billing</span>
      </button>
      <button class="cat-btn" data-cat="technical" onclick="setCategory(this,'technical')">
        <i class="ti ti-tool"></i><span>Technical</span>
      </button>
      <button class="cat-btn" data-cat="account" onclick="setCategory(this,'account')">
        <i class="ti ti-user-circle"></i><span>Account</span>
      </button>
      <button class="cat-btn" data-cat="gaming" onclick="setCategory(this,'gaming')">
        <i class="ti ti-device-gamepad-2"></i><span>Gaming</span>
      </button>
    </div>
    <div id="sidebar-footer">
      <div class="agent-card">
        <div class="agent-dot"></div>
        <div class="agent-info">
          <p>NexaSupport AI</p>
          <span>Online now</span>
        </div>
      </div>
    </div>
  </div>

  <div id="chat-area">
    <div id="chat-header">
      <div id="chat-header-left">
        <div class="header-avatar">NS</div>
        <div>
          <div id="chat-title">General Support</div>
          <div id="chat-subtitle">Ask me anything</div>
        </div>
      </div>
      <span id="ticket-badge">Active</span>
    </div>

    <div id="messages"></div>

    <div id="input-area">
      <div class="input-row">
        <textarea
          id="user-input"
          placeholder="Describe your issue…"
          rows="1"
          onkeydown="handleKey(event)"
          oninput="autoResize(this)"
        ></textarea>
        <button id="send-btn" onclick="sendMessage()" aria-label="Send message">
          <i class="ti ti-send"></i>
        </button>
      </div>
    </div>
  </div>
</div>

<script>
  // ── Configuration ──────────────────────────────────────────────
  // Replace with your Anthropic API key. For production, route through a backend proxy.
  const API_KEY = 'YOUR_ANTHROPIC_API_KEY';

  const categories = {
    general:   { title: 'General Support',   subtitle: 'Ask me anything' },
    billing:   { title: 'Billing Support',    subtitle: 'Payments & subscriptions' },
    technical: { title: 'Technical Support',  subtitle: 'Bugs & connectivity' },
    account:   { title: 'Account Support',    subtitle: 'Login & security' },
    gaming:    { title: 'Gaming Support',     subtitle: 'In-game & launcher help' }
  };

  const greetings = {
    general:   "Hi! I'm the NexaSupport AI assistant. I can help with billing, technical issues, account access, and gaming support. What can I help you with today?",
    billing:   "Billing Support here. I can help with charges, subscription changes, refunds, and invoice queries. What's your billing question?",
    technical: "Technical Support ready. Tell me about the issue you're experiencing — error messages, steps to reproduce, and your platform all help me diagnose faster.",
    account:   "Account Support here. I can help with password resets, login issues, two-factor auth, and account recovery. How can I help?",
    gaming:    "Gaming Support here! Whether it's a launch issue, in-game bug, connectivity problem, or matchmaking trouble — I've got you. What's the issue?"
  };

  const defaultChips = {
    general:   ['Reset my password', 'I was charged twice', 'Game won\'t launch'],
    billing:   ['Cancel subscription', 'Request a refund', 'Update payment method'],
    technical: ['App keeps crashing', 'Can\'t connect to server', 'Slow performance'],
    account:   ['Forgot my password', '2FA not working', 'Account locked'],
    gaming:    ['Game won\'t start', 'Lost my progress', 'Lag / connection issues']
  };

  let currentCategory = 'general';
  let isLoading = false;
  let conversationHistory = [];

  // ── Init ───────────────────────────────────────────────────────
  window.addEventListener('DOMContentLoaded', () => {
    renderWelcome('general');
  });

  function setCategory(btn, cat) {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentCategory = cat;
    conversationHistory = [];
    document.getElementById('chat-title').textContent = categories[cat].title;
    document.getElementById('chat-subtitle').textContent = categories[cat].subtitle;
    document.getElementById('messages').innerHTML = '';
    renderWelcome(cat);
  }

  function renderWelcome(cat) {
    appendBotMessage(greetings[cat], defaultChips[cat]);
  }

  // ── Message rendering ──────────────────────────────────────────
  function now() {
    return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function appendBotMessage(text, chips) {
    const msgEl = document.getElementById('messages');
    const chipHtml = chips
      ? `<div class="suggestion-chips">${chips.map(c =>
          `<button class="chip" onclick="sendSuggestion('${c.replace(/'/g, "\\'")}')">${c}</button>`
        ).join('')}</div>`
      : '';
    const div = document.createElement('div');
    div.className = 'msg bot';
    div.innerHTML = `
      <div class="bot-avatar"><i class="ti ti-robot"></i></div>
      <div>
        <div class="msg-bubble">${escapeHtml(text)}</div>
        <span class="msg-time">${now()}</span>
        ${chipHtml}
      </div>`;
    msgEl.appendChild(div);
    msgEl.scrollTop = msgEl.scrollHeight;
  }

  function appendUserMessage(text) {
    const msgEl = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'msg user';
    div.innerHTML = `
      <div class="user-avatar">You</div>
      <div>
        <div class="msg-bubble">${escapeHtml(text)}</div>
        <span class="msg-time">${now()}</span>
      </div>`;
    msgEl.appendChild(div);
    msgEl.scrollTop = msgEl.scrollHeight;
  }

  function showTyping() {
    const msgEl = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'msg bot';
    div.id = 'typing-msg';
    div.innerHTML = `
      <div class="bot-avatar"><i class="ti ti-robot"></i></div>
      <div><div class="msg-bubble">
        <div class="typing-indicator"><span></span><span></span><span></span></div>
      </div></div>`;
    msgEl.appendChild(div);
    msgEl.scrollTop = msgEl.scrollHeight;
  }

  function hideTyping() {
    const el = document.getElementById('typing-msg');
    if (el) el.remove();
  }

  function showEscalateBanner() {
    const msgEl = document.getElementById('messages');
    const div = document.createElement('div');
    div.innerHTML = `
      <div class="escalate-banner">
        <i class="ti ti-headset" style="font-size:16px"></i>
        Connecting you to a human agent — average wait: 3 min
      </div>`;
    msgEl.appendChild(div);
    msgEl.scrollTop = msgEl.scrollHeight;
  }

  // ── Input handling ─────────────────────────────────────────────
  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  function autoResize(el) {
    el.style.height = '40px';
    el.style.height = Math.min(el.scrollHeight, 100) + 'px';
  }

  function sendSuggestion(text) {
    document.getElementById('user-input').value = text;
    sendMessage();
  }

  // ── API call ───────────────────────────────────────────────────
  async function sendMessage() {
    const input = document.getElementById('user-input');
    const text = input.value.trim();
    if (!text || isLoading) return;

    input.value = '';
    input.style.height = '40px';
    isLoading = true;
    document.getElementById('send-btn').disabled = true;

    appendUserMessage(text);
    conversationHistory.push({ role: 'user', content: text });
    showTyping();

    const systemPrompt = `You are a friendly, professional AI customer support agent for NexaSupport — a company specialising in gaming and SaaS product support. You are currently handling ${currentCategory} support queries.

Guidelines:
- Keep responses concise (2–4 sentences max) and empathetic.
- For issues you cannot resolve, recommend escalating to a human agent.
- Never invent policies, prices, or account details.
- If unsure, say so clearly and offer to escalate.
- Use a warm but professional tone.`;

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': API_KEY,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-calls': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 1000,
          system: systemPrompt,
          messages: conversationHistory
        })
      });

      const data = await response.json();
      hideTyping();

      if (!response.ok) {
        const errMsg = data?.error?.message || 'Something went wrong. Please try again.';
        appendBotMessage(errMsg);
        isLoading = false;
        document.getElementById('send-btn').disabled = false;
        return;
      }

      const reply = data.content?.[0]?.text || "I'm sorry, I couldn't process that. Please try again.";
      conversationHistory.push({ role: 'assistant', content: reply });
      appendBotMessage(reply);

      const needsEscalation = /human agent|escalate|live agent|speak to someone/i.test(reply);
      if (needsEscalation) {
        setTimeout(showEscalateBanner, 600);
      }

    } catch (err) {
      hideTyping();
      appendBotMessage("I'm having trouble connecting right now. Please check your connection and try again.");
    }

    isLoading = false;
    document.getElementById('send-btn').disabled = false;
    document.getElementById('user-input').focus();
  }

  // ── Utility ────────────────────────────────────────────────────
  function escapeHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
</script>

</body>
</html>
